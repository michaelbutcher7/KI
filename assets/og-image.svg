<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#283676"/>
      <stop offset="100%" stop-color="#3f77bb"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.85" cy="0.15" r="0.6">
      <stop offset="0%" stop-color="#c0ce3a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#c0ce3a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.1" cy="0.9" r="0.6">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <g transform="translate(80, 110)">
    <rect width="96" height="96" rx="22" fill="#ffffff" fill-opacity="0.12" stroke="#c0ce3a" stroke-width="2"/>
    <text x="48" y="62" text-anchor="middle"
          font-family="Helvetica, Arial, sans-serif" font-weight="800" font-size="42"
          fill="#ffffff">KI</text>
  </g>
  <text x="200" y="160" font-family="Helvetica, Arial, sans-serif" font-weight="600"
        font-size="22" fill="#c0ce3a" letter-spacing="6">FORTBILDUNG · KI-MAGIE</text>

  <text x="80" y="320" font-family="Helvetica, Arial, sans-serif" font-weight="800"
